<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pencatatan Utilitas Mall 23</title>
    <!-- Library Tanda Tangan Resmi Terstabil -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 15px; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #333; font-size: 1.2rem; line-height: 1.4; margin-top: 5px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        
        /* Area Pad Tanda Tangan Terkunci Fisik */
        .canvas-container { border: 2px dashed #999; background: #ffffff; border-radius: 4px; position: relative; margin-top: 5px; height: 160px; width: 100%; box-sizing: border-box; }
        canvas { width: 100% !important; height: 160px !important; display: block; touch-action: none; cursor: crosshair; }
        
        .clear-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 5px; float: right; font-size: 0.8rem; font-weight: bold; }
        button[type="submit"] { width: 100%; background: #2ecc71; color: white; border: none; padding: 14px; font-size: 1.1rem; border-radius: 4px; cursor: pointer; margin-top: 25px; font-weight: bold; }
        button[type="submit"]:disabled { background: #95a5a6; cursor: not-allowed; }
        
        /* Kotak Notifikasi Dinamis */
        .status-box { text-align: center; font-weight: bold; font-size: 1rem; padding: 12px; border-radius: 4px; margin-top: 20px; display: none; }
        .loading { background: #fff3e0; color: #e67e22; border: 1px solid #ffe0b2; }
        .success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>

<div class="container">
    <h2>PENCATATAN UTILITAS LISTRIK, AIR DAN GAS<br>MALL 23 SEMARANG</h2>
    
    <!-- Kotak Indikator Status Pengiriman & Sinkronisasi Otomatis -->
    <div id="statusBox" class="status-box"></div>

    <form id="utilityForm">
        <label>Tanggal Pencatatan</label>
        <input type="datetime-local" id="tanggal" required>

        <label>Nama Tenant</label>
        <input type="text" id="namaTenant" placeholder="Masukkan nama tenant" required>

        <label>Lokasi</label>
        <input type="text" id="lokasi" placeholder="Contoh: Lantai 1 Unit 12" required>

        <label>Zona (Pilih Salah Satu)</label>
        <select id="zona" required>
            <option value="" disabled selected>-- Pilih Zona --</option>
            <option value="Zona A">Zona A</option>
            <option value="Zona B">Zona B</option>
            <option value="Zona C">Zona C</option>
            <option value="Zona D">Zona D</option>
        </select>

        <label>Pencatatan Utility (Pilih Salah Satu)</label>
        <select id="pencatatanUtility" required>
            <option value="" disabled selected>-- Pilih Utility --</option>
            <option value="Listrik">Listrik</option>
            <option value="Air">Air</option>
            <option value="Gas">Gas</option>
        </select>

        <label>Meter Reading</label>
        <input type="number" id="meterReading" step="any" placeholder="Masukkan angka meteran" required>

        <label>Petugas / Teknisi</label>
        <input type="text" id="petugasTeknisi" placeholder="Nama petugas" required>

        <label>Foto Meter (Wajib)</label>
        <input type="file" id="fotoMeter" accept="image/*" capture="environment" required>

        <label>Tanda Tangan Petugas</label>
        <div class="canvas-container">
            <canvas id="canvasPetugas"></canvas>
            <button type="button" class="clear-btn" id="clearPetugas">Hapus</button>
        </div>
        <div style="clear: both;"></div>

        <label>Tanda Tangan Tenant</label>
        <div class="canvas-container">
            <canvas id="canvasTenant"></canvas>
            <button type="button" class="clear-btn" id="clearTenant">Hapus</button>
        </div>
        <div style="clear: both;"></div>

        <button type="submit" id="submitBtn">KIRIM DATA</button>
    </form>
</div>

<script>
    // Konfigurasi Link Jembatan Aktif & Token API ImgBB Perusahaan Anda
    const WEB_APP_URL = "https://google.com";
    const IMGBB_API_KEY = "149f5366346fb63664acd198bf12b408";

    const canvasP = document.getElementById('canvasPetugas');
    const canvasT = document.getElementById('canvasTenant');
    let padPetugas, padTenant;

    // Fungsi Inisialisasi Ukuran Menggunakan Mesin Resmi SignaturePad
    function initSignatures() {
        const rectP = canvasP.parentElement.getBoundingClientRect();
        canvasP.width = rectP.width || 320;
        canvasP.height = 160;
        
        const rectT = canvasT.parentElement.getBoundingClientRect();
        canvasT.width = rectT.width || 320;
        canvasT.height = 160;

        padPetugas = new SignaturePad(canvasP, { backgroundColor: 'rgb(255, 255, 255)', penColor: 'rgb(0, 0, 0)' });
        padTenant = new SignaturePad(canvasT, { backgroundColor: 'rgb(255, 255, 255)', penColor: 'rgb(0, 0, 0)' });
    }

    window.addEventListener('DOMContentLoaded', initSignatures);
    window.addEventListener('resize', initSignatures);
    setTimeout(initSignatures, 800);

    document.getElementById('clearPetugas').addEventListener('click', () => padPetugas.clear());
    document.getElementById('clearTenant').addEventListener('click', () => padTenant.clear());

    // Pengunggah Berkas Gambar Kilat ke Cloud Hosting ImgBB
    async function uploadToImgBB(base64Data) {
        const cleanBase64 = base64Data.split(',');
        const formData = new FormData();
        formData.append("key", IMGBB_API_KEY);
        formData.append("image", cleanBase64[1] || cleanBase64[0]);

        const response = await fetch("https://imgbb.com", { method: "POST", body: formData });
        const result = await response.json();
        if (result.success) return result.data.url;
        throw new Error("Gagal mengonversi gambar cloud.");
    }

    // Kompresor Ukuran Gambar Otomatis (Memotong Ukuran Menjadi < 200KB Demi Kecepatan < 5 Detik)
    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    if (width > 800) { height *= 800 / width; width = 800; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
            };
        });
    }

    // KIRIM DATA UTAMA KE GOOGLE SCRIPT
    async function postDataToGoogle(formData) {
        return fetch(WEB_APP_URL, { 
            method: "POST", 
            mode: "no-cors", 
            headers: { "Content-Type": "application/json" }, 
            body: JSON.stringify(formData) 
        });
    }

    // OTOMATISASI ANTREAN OFFLINE (Penyelamat Saat Jaringan Buruk)
    async function executeOfflineSync() {
        let queue = JSON.parse(localStorage.getItem("offline_utility_reports")) || [];
        if (queue.length === 0) return;

        if (navigator.onLine) {
            const statusBox = document.getElementById("statusBox");
            statusBox.className = "status-box loading";
            statusBox.style.display = "block";
            statusBox.innerText = `🔄 Mendeteksi Sinyal Pulih! Mengunggah otomatis ${queue.length} laporan tertunda...`;

            for (let i = 0; i < queue.length; i++) {
                try {
                    await postDataToGoogle(queue[i]);
                    queue.splice(i, 1);
                    i--;
                    localStorage.setItem("offline_utility_reports", JSON.stringify(queue));
                } catch (err) {
                    console.error("Gagal mengirim antrean, ditunda kembali.", err);
                    break;
                }
            }

            if (queue.length === 0) {
                statusBox.className = "status-box success";
                statusBox.innerText = "✅ Semua laporan antrean offline sukses terunggah otomatis!";
                setTimeout(() => { statusBox.style.display = "none"; }, 5000);
            }
        }
    }

    window.addEventListener('online', executeOfflineSync);
    setInterval(executeOfflineSync, 20000); // Cek berkala tiap 20 detik

    // Penanganan Pengiriman Seluruh Form Berurutan
    document.getElementById("utilityForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById("submitBtn");
        const statusBox = document.getElementById("statusBox");

        if (padPetugas.isEmpty() || padTenant.isEmpty()) {
            alert("Kolom wajib diisi berurutan! Tanda tangan Petugas dan Tenant tidak boleh kosong.");
            return;
        }

        const fileInput = document.getElementById("fotoMeter").files;
