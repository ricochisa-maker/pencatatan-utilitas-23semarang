<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencatatan Utilitas Mall 23</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 15px; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #333; font-size: 1.2rem; line-height: 1.4; margin-top: 5px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        .canvas-container { border: 2px dashed #999; background: #f9f9f9; border-radius: 4px; position: relative; margin-top: 5px; }
        canvas { width: 100%; height: 130px; display: block; }
        .clear-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-top: 5px; float: right; font-size: 0.8rem; }
        button[type="submit"] { width: 100%; background: #2ecc71; color: white; border: none; padding: 12px; font-size: 1.1rem; border-radius: 4px; cursor: pointer; margin-top: 25px; font-weight: bold; }
        .status-sync { text-align: center; font-weight: bold; color: #e67e22; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>PENCATATAN UTILITAS LISTRIK, AIR DAN GAS<br>MALL 23 SEMARANG</h2>
    <div id="syncStatus" class="status-sync"></div>

    <form id="utilityForm">
        <label>Tanggal Pencatatan</label>
        <input type="datetime-local" id="tanggal" required>

        <label>Nama Tenant</label>
        <input type="text" id="namaTenant" placeholder="Masukkan nama tenant" required>

        <label>Lokasi</label>
        <input type="text" id="lokasi" placeholder="Contoh: Lantai 1 Unit 12" required>

        <label>Zona</label>
        <select id="zona" required>
            <option value="" disabled selected>-- Pilih Zona --</option>
            <option value="Zona A">Zona A</option>
            <option value="Zona B">Zona B</option>
            <option value="Zona C">Zona C</option>
            <option value="Zona D">Zona D</option>
        </select>

        <label>Pencatatan Utility</label>
        <select id="pencatatanUtility" required>
            <option value="" disabled selected>-- Pilih Utility --</option>
            <option value="Listrik">Listrik</option>
            <option value="Air">Air</option>
            <option value="Gas">Gas</option>
        </select>

        <label>Meter Reading</label>
        <input type="number" id="meterReading" step="any" placeholder="Masukkan angka meteran" required>

        <label>Petugas / Teknisi</label>
        <input type="text" id="petugasTeknisi" placeholder="Nama petugas" required>

        <label>Foto Meter (Wajib)</label>
        <input type="file" id="fotoMeter" accept="image/*" capture="environment" required>

        <label>Tanda Tangan Petugas</label>
        <div class="canvas-container">
            <canvas id="canvasPetugas"></canvas>
            <button type="button" class="clear-btn" onclick="padPetugas.clear()">Hapus</button>
        </div>
        <div style="clear: both;"></div>

        <label>Tanda Tangan Tenant</label>
        <div class="canvas-container">
            <canvas id="canvasTenant"></canvas>
            <button type="button" class="clear-btn" onclick="padTenant.clear()">Hapus</button>
        </div>
        <div style="clear: both;"></div>

        <button type="submit">KIRIM DATA</button>
    </form>
</div>

<script>
    const WEB_APP_URL = "https://google.com";

    const canvasP = document.getElementById('canvasPetugas');
    const canvasT = document.getElementById('canvasTenant');
    const padPetugas = new SignaturePad(canvasP);
    const padTenant = new SignaturePad(canvasT);

    function resizeCanvas() {
        [canvasP, canvasT].forEach(canvas => {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = 130 * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        });
        padPetugas.clear(); padTenant.clear();
    }
    
    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("DOMContentLoaded", resizeCanvas);

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    async function sendDataToGoogle(data) {
        return fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });
    }

    async function syncOfflineData() {
        let offlineData = JSON.parse(localStorage.getItem("offline_utility_data")) || [];
        if (offlineData.length === 0) {
            document.getElementById("syncStatus").innerText = "";
            return;
        }
        
        if (navigator.onLine) {
            document.getElementById("syncStatus").innerText = `Mengunggah ${offlineData.length} data tertunda...`;
            for (let i = 0; i < offlineData.length; i++) {
                try {
                    await sendDataToGoogle(offlineData[i]);
                    offlineData.splice(i, 1);
                    i--;
                    localStorage.setItem("offline_utility_data", JSON.stringify(offlineData));
                } catch (e) {
                    console.error(e);
                    break;
                }
            }
            if (offlineData.length === 0) {
                document.getElementById("syncStatus").innerText = "Semua data tertunda sukses terunggah!";
                setTimeout(() => document.getElementById("syncStatus").innerText = "", 3000);
            }
        } else {
            document.getElementById("syncStatus").innerText = `Ada ${offlineData.length} data tersimpan lokal (Menunggu Sinyal)`;
        }
    }

    window.addEventListener('online', syncOfflineData);
    setInterval(syncOfflineData, 15000);

    document.getElementById("utilityForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        if (padPetugas.isEmpty() || padTenant.isEmpty()) {
            alert("Kedua belah pihak wajib mengisi tanda tangan!");
            return;
        }

        const fileInput = document.getElementById("fotoMeter").files;
        let fotoBase64 = "";
        if (fileInput.length > 0) {
            fotoBase64 = await fileToBase64(fileInput[0]);
        }

        const formData = {
            tanggal: document.getElementById("tanggal").value.replace("T", " "),
            namaTenant: document.getElementById("namaTenant").value,
            lokasi: document.getElementById("lokasi").value,
            zona: document.getElementById("zona").value,
            pencatatanUtility: document.getElementById("pencatatanUtility").value,
            meterReading: document.getElementById("meterReading").value,
            petugasTeknisi: document.getElementById("petugasTeknisi").value,
            fotoMeter: fotoBase64,
            ttdPetugas: padPetugas.toDataURL(),
            ttdTenant: padTenant.toDataURL()
        };

        if (!navigator.onLine) {
            let offlineData = JSON.parse(localStorage.getItem("offline_utility_data")) || [];
            offlineData.push(formData);
            localStorage.setItem("offline_utility_data", JSON.stringify(offlineData));
            alert("Koneksi offline! Data Anda disimpan aman di memori HP dan otomatis terupload saat internet kembali stabil.");
            document.getElementById("utilityForm").reset();
            padPetugas.clear(); padTenant.clear();
            syncOfflineData();
            return;
        }

        try {
            await sendDataToGoogle(formData);
            alert("Data sukses terkirim ke Master Data!");
            document.getElementById("utilityForm").reset();
            padPetugas.clear(); padTenant.clear();
        } catch (error) {
            let offlineData = JSON.parse(localStorage.getItem("offline_utility_data")) || [];
            offlineData.push(formData);
            localStorage.setItem("offline_utility_data", JSON.stringify(offlineData));
            syncOfflineData();
        }
    });
</script>

</body>
</html>
