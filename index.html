<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pencatatan Utilitas Mall 23</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 15px; -webkit-user-select: none; user-select: none; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #333; font-size: 1.2rem; line-height: 1.4; margin-top: 5px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        .canvas-container { border: 2px dashed #999; background: #ffffff; border-radius: 4px; position: relative; margin-top: 5px; height: 150px; width: 100%; touch-action: none; }
        canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: crosshair; }
        .clear-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 5px; float: right; font-size: 0.8rem; font-weight: bold; }
        button[type="submit"] { width: 100%; background: #2ecc71; color: white; border: none; padding: 14px; font-size: 1.1rem; border-radius: 4px; cursor: pointer; margin-top: 25px; font-weight: bold; }
        button[type="submit"]:disabled { background: #95a5a6; cursor: not-allowed; }
        .status-sync { text-align: center; font-weight: bold; color: #e67e22; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>PENCATATAN UTILITAS LISTRIK, AIR DAN GAS<br>MALL 23 SEMARANG</h2>
    <div id="syncStatus" class="status-sync"></div>

    <form id="utilityForm">
        <label>Tanggal Pencatatan</label>
        <input type="datetime-local" id="tanggal" required>

        <label>Nama Tenant</label>
        <input type="text" id="namaTenant" placeholder="Masukkan nama tenant" required>

        <label>Lokasi</label>
        <input type="text" id="lokasi" placeholder="Contoh: Lantai 1 Unit 12" required>

        <label>Zona</label>
        <select id="zona" required>
            <option value="" disabled selected>-- Pilih Zona --</option>
            <option value="Zona A">Zona A</option>
            <option value="Zona B">Zona B</option>
            <option value="Zona C">Zona C</option>
            <option value="Zona D">Zona D</option>
        </select>

        <label>Pencatatan Utility</label>
        <select id="pencatatanUtility" required>
            <option value="" disabled selected>-- Pilih Utility --</option>
            <option value="Listrik">Listrik</option>
            <option value="Air">Air</option>
            <option value="Gas">Gas</option>
        </select>

        <label>Meter Reading</label>
        <input type="number" id="meterReading" step="any" placeholder="Masukkan angka meteran" required>

        <label>Petugas / Teknisi</label>
        <input type="text" id="petugasTeknisi" placeholder="Nama petugas" required>

        <label>Foto Meter (Wajib)</label>
        <input type="file" id="fotoMeter" accept="image/*" capture="environment" required>

        <label>Tanda Tangan Petugas</label>
        <div class="canvas-container">
            <canvas id="canvasPetugas"></canvas>
            <button type="button" class="clear-btn" id="clearPetugas">Hapus</button>
        </div>
        <div style="clear: both;"></div>

        <label>Tanda Tangan Tenant</label>
        <div class="canvas-container">
            <canvas id="canvasTenant"></canvas>
            <button type="button" class="clear-btn" id="clearTenant">Hapus</button>
        </div>
        <div style="clear: both;"></div>

        <button type="submit" id="submitBtn">KIRIM DATA</button>
    </form>
</div>

<script>
    const WEB_APP_URL = "https://google.com";

    // Setup Kanvas Tanda Tangan
    function setupSignature(canvasId, clearId) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 150;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000000';
        }
        window.addEventListener('resize', resize);
        setTimeout(resize, 300);

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches.clientX : e.clientX;
            const clientY = e.touches ? e.touches.clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDraw(e) { drawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); e.preventDefault(); }
        function draw(e) { if (!drawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); e.preventDefault(); }
        function stopDraw() { drawing = false; }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        window.addEventListener('touchend', stopDraw);

        document.getElementById(clearId).addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        return canvas;
    }

    const canvasP = setupSignature('canvasPetugas', 'clearPetugas');
    const canvasT = setupSignature('canvasTenant', 'clearTenant');

    // SOLUSI: Mengompres foto otomatis agar pengiriman data super cepat ringan
    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    // Batasi resolusi maksimal lebar/tinggi di 1024 pixel (Sangat jernih untuk angka meteran)
                    const MAX_WIDTH = 1024;
                    const MAX_HEIGHT = 1024;
                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Kompres kualitas gambar ke 70% (.jpeg ringan)
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    resolve(dataUrl);
                };
            };
        });
    }

    async function submitForm(formData) {
        return fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData)
        });
    }

    document.getElementById("utilityForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const submitBtn = document.getElementById("submitBtn");
        const syncStatus = document.getElementById("syncStatus");

        const fileInput = document.getElementById("fotoMeter").files;
        if (fileInput.length === 0) {
            alert("Foto meteran wajib diisi!");
            return;
        }

        // Kunci tombol kirim agar tidak ditekan berulang-ulang
        submitBtn.disabled = true;
        syncStatus.innerText = "Sedang memproses & mengompres foto...";

        let fotoBase64 = await compressImage(fileInput[0]);

        const formData = {
            tanggal: document.getElementById("tanggal").value.replace("T", " "),
            namaTenant: document.getElementById("namaTenant").value,
            lokasi: document.getElementById("lokasi").value,
            zona: document.getElementById("zona").value,
            pencatatanUtility: document.getElementById("pencatatanUtility").value,
            meterReading: document.getElementById("meterReading").value,
            petugasTeknisi: document.getElementById("petugasTeknisi").value,
            fotoMeter: fotoBase64,
            ttdPetugas: canvasP.toDataURL(),
            ttdTenant: canvasT.toDataURL()
        };

        try {
            syncStatus.innerText = "Mengirim data ke Spreadsheet, mohon tunggu...";
            await submitForm(formData);
            alert("Data BERHASIL terkirim dalam beberapa detik!");
            document.getElementById("utilityForm").reset();
            document.getElementById("clearPetugas").click();
            document.getElementById("clearTenant").click();
        } catch (error) {
            alert("Gagal mengirim data. Coba cek koneksi internet Anda.");
        } finally {
            submitBtn.disabled = false;
            syncStatus.innerText = "";
        }
    });
</script>

</body>
</html>
