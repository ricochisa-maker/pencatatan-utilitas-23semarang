<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pencatatan Utilitas Mall 23</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 15px; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #333; font-size: 1.2rem; line-height: 1.4; margin-top: 5px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        .canvas-container { border: 2px dashed #999; background: #ffffff; border-radius: 4px; position: relative; margin-top: 5px; height: 150px; width: 100%; box-sizing: border-box; }
        canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: crosshair; }
        .clear-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 5px; float: right; font-size: 0.8rem; font-weight: bold; }
        button[type="submit"] { width: 100%; background: #2ecc71; color: white; border: none; padding: 14px; font-size: 1.1rem; border-radius: 4px; cursor: pointer; margin-top: 25px; font-weight: bold; }
        button[type="submit"]:disabled { background: #95a5a6; cursor: not-allowed; }
        .status-sync { text-align: center; font-weight: bold; color: #e67e22; margin-top: 15px; font-size: 1rem; padding: 10px; border-radius: 4px; background: #fff3e0; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>PENCATATAN UTILITAS LISTRIK, AIR DAN GAS<br>MALL 23 SEMARANG</h2>
    <div id="syncStatus" class="status-sync"></div>

    <form id="utilityForm">
        <label>Tanggal Pencatatan</label>
        <input type="datetime-local" id="tanggal" required>

        <label>Nama Tenant</label>
        <input type="text" id="namaTenant" placeholder="Masukkan nama tenant" required>

        <label>Lokasi</label>
        <input type="text" id="lokasi" placeholder="Contoh: Lantai 1 Unit 12" required>

        <label>Zona</label>
        <select id="zona" required>
            <option value="" disabled selected>-- Pilih Zona --</option>
            <option value="Zona A">Zona A</option>
            <option value="Zona B">Zona B</option>
            <option value="Zona C">Zona C</option>
            <option value="Zona D">Zona D</option>
        </select>

        <label>Pencatatan Utility</label>
        <select id="pencatatanUtility" required>
            <option value="" disabled selected>-- Pilih Utility --</option>
            <option value="Listrik">Listrik</option>
            <option value="Air">Air</option>
            <option value="Gas">Gas</option>
        </select>

        <label>Meter Reading</label>
        <input type="number" id="meterReading" step="any" placeholder="Masukkan angka meteran" required>

        <label>Petugas / Teknisi</label>
        <input type="text" id="petugasTeknisi" placeholder="Nama petugas" required>

        <label>Foto Meter (Wajib)</label>
        <input type="file" id="fotoMeter" accept="image/*" capture="environment" required>

        <label>Tanda Tangan Petugas</label>
        <div class="canvas-container">
            <canvas id="canvasPetugas"></canvas>
            <button type="button" class="clear-btn" id="clearPetugas">Hapus</button>
        </div>
        <div style="clear: both;"></div>

        <label>Tanda Tangan Tenant</label>
        <div class="canvas-container">
            <canvas id="canvasTenant"></canvas>
            <button type="button" class="clear-btn" id="clearTenant">Hapus</button>
        </div>
        <div style="clear: both;"></div>

        <button type="submit" id="submitBtn">KIRIM DATA</button>
    </form>
</div>

<script>
    const WEB_APP_URL = "https://google.com";
    const IMGBB_API_KEY = "149f5366346fb63664acd198bf12b408";

    // PENGATURAN KANVAS ELEMEN MURNI (TANPA LIBRARY LUAR)
    function createSignatureEngine(canvasId, clearId) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let hasDrawn = false;

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#000000';
        }
        
        window.addEventListener('load', resize);
        window.addEventListener('resize', resize);
        setTimeout(resize, 500);

        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
            }
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function start(e) {
            isDrawing = true;
            hasDrawn = true;
            const pos = getCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            if(e.touches) e.preventDefault();
        }

        function move(e) {
            if (!isDrawing) return;
            const pos = getCoordinates(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            if(e.touches) e.preventDefault();
        }

        function stop() { isDrawing = false; }

        // Event Sentuhan HP Android / iOS
        canvas.addEventListener('touchstart', start, { passive: false });
        canvas.addEventListener('touchmove', move, { passive: false });
        canvas.addEventListener('touchend', stop);

        // Event Mouse Laptop / Desktop
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);

        document.getElementById(clearId).addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hasDrawn = false;
        });

        return {
            isEmpty: () => !hasDrawn,
            getDataURL: () => canvas.toDataURL('image/png')
        };
    }

    const padPetugas = createSignatureEngine('canvasPetugas', 'clearPetugas');
    const padTenant = createSignatureEngine('canvasTenant', 'clearTenant');

    async function uploadToImgBB(base64Data) {
        const cleanBase64 = base64Data.split(',')[1];
        const formData = new FormData();
        formData.append("key", IMGBB_API_KEY);
        formData.append("image", cleanBase64);

        const response = await fetch("https://imgbb.com", { method: "POST", body: formData });
        const result = await response.json();
        if (result.success) return result.data.url;
        throw new Error("Gagal konversi hosting gambar.");
    }

    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    if (width > 800) { height *= 800 / width; width = 800; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        });
    }

    document.getElementById("utilityForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById("submitBtn");
        const syncStatus = document.getElementById("syncStatus");

        if (padPetugas.isEmpty() || padTenant.isEmpty()) {
            alert("Kedua belah pihak wajib mengisi tanda tangan!");
            return;
        }

        const fileInput = document.getElementById("fotoMeter").files;
        if (fileInput.length === 0) {
            alert("Foto meteran wajib dilampirkan!");
            return;
        }

        submitBtn.disabled = true;
        syncStatus.style.display = "block";
        syncStatus.innerText = "⏳ Sedang memproses dokumen & gambar pelaporan...";

        try {
            const compressedPhoto = await compressImage(fileInput[0]);
            
            syncStatus.innerText = "📸 Mengonversi foto menjadi tautan klik...";
            const urlFoto = await uploadToImgBB(compressedPhoto);

            syncStatus.innerText = "✍️ Mengonversi tanda tangan digital...";
            const urlTtdP = await uploadToImgBB(padPetugas.getDataURL());
            const urlTtdT = await uploadToImgBB(padTenant.getDataURL());

            const formData = {
                tanggal: document.getElementById("tanggal").value.replace("T", " "),
                namaTenant: document.getElementById("namaTenant").value,
                lokasi: document.getElementById("lokasi").value,
                zona: document.getElementById("zona").value,
                pencatatanUtility: document.getElementById("pencatatanUtility").value,
                meterReading: document.getElementById("meterReading").value,
                petugasTeknisi: document.getElementById("petugasTeknisi").value,
                fotoMeter: urlFoto,
                ttdPetugas: urlTtdP,
